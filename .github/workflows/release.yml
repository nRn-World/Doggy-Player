name: Build & Release Doggy Player

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            build_cmd: npm run build:electron
            artifacts: "release/*.exe\nrelease/*.exe.blockmap\nrelease/*.zip\nrelease/latest.yml"
          - os: macos-latest
            build_cmd: npm run build:electron:mac
            artifacts: "release/*.dmg\nrelease/*.zip\nrelease/latest-mac.yml"
          - os: ubuntu-latest
            build_cmd: npm run build:electron:linux
            artifacts: "release/*.AppImage\nrelease/*.deb\nrelease/*.zip\nrelease/latest-linux.yml"

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build & Package
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false
        run: ${{ matrix.build_cmd }}

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.artifacts }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
